name: CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "src/nonebot_plugin_git_poller/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "src/nonebot_plugin_git_poller/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Run tests
        run: uv run python -m pytest --cov=nonebot_plugin_git_poller --cov-report=term-missing --cov-report=xml

      - name: Compile
        run: uv run python -m compileall -q src/nonebot_plugin_git_poller tests

      - name: Build package
        run: uv build

      - name: Upload coverage
        if: matrix.python-version == '3.10'
        uses: codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true
