name: CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "src/nonebot_plugin_git_poller/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "src/nonebot_plugin_git_poller/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.13"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Test
        run: uv run pytest -q

      - name: Compile
        run: uv run python -m compileall -q src/nonebot_plugin_git_poller tests

      - name: Build package
        run: uv build
